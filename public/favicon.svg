<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>

  <!-- Warehouse roof/triangle -->
  <path d="M5 16 L16 8 L27 16" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Building body -->
  <rect x="7" y="16" width="18" height="10" rx="1" fill="white"/>

  <!-- Door -->
  <rect x="13" y="19" width="6" height="7" rx="1" fill="#2563eb"/>

  <!-- Left window -->
  <rect x="8.5" y="17.5" width="3.5" height="3" rx="0.5" fill="#2563eb" opacity="0.5"/>

  <!-- Right window -->
  <rect x="20" y="17.5" width="3.5" height="3" rx="0.5" fill="#2563eb" opacity="0.5"/>

  <!-- Center top line (ridge) -->
  <line x1="16" y1="8" x2="16" y2="16" stroke="white" stroke-width="1.2" opacity="0.5"/>
</svg>
